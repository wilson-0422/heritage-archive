{% extends "base.html" %}

{% block title %}编辑传承人 - 非遗文化数字化档案系统{% endblock %}

{% block content %}
<div class="form-container">
    <h2>编辑传承人</h2>
    <form method="POST" action="{{ url_for('inheritors.edit', inheritor_id=inheritor.id) }}">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" value="{{ inheritor.name }}" required>
        </div>
        <div class="form-group">
            <label for="gender">性别</label>
            <select id="gender" name="gender" required>
                <option value="男" {% if inheritor.gender == '男' %}selected{% endif %}>男</option>
                <option value="女" {% if inheritor.gender == '女' %}selected{% endif %}>女</option>
            </select>
        </div>
        <div class="form-group">
            <label for="birth_year">出生年份</label>
            <input type="number" id="birth_year" name="birth_year" value="{{ inheritor.birth_year }}" required>
        </div>
        <div class="form-group">
            <label for="category">非遗类别</label>
            <input type="text" id="category" name="category" value="{{ inheritor.category }}" required>
        </div>
        <div class="form-group">
            <label for="heritage_item">传承项目</label>
            <input type="text" id="heritage_item" name="heritage_item" value="{{ inheritor.heritage_item }}" required>
        </div>
        <div class="form-group">
            <label for="province">省份</label>
            <input type="text" id="province" name="province" value="{{ inheritor.province }}" required>
        </div>
        <div class="form-group">
            <label for="city">城市</label>
            <input type="text" id="city" name="city" value="{{ inheritor.city }}" required>
        </div>
        <div class="form-group">
            <label for="phone">联系电话</label>
            <input type="text" id="phone" name="phone" value="{{ inheritor.phone }}">
        </div>
        <div class="form-group">
            <label for="description">个人简介</label>
            <textarea id="description" name="description" rows="5">{{ inheritor.description }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('inheritors.detail', inheritor_id=inheritor.id) }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}

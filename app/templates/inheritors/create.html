{% extends "base.html" %}

{% block title %}添加传承人 - 非遗文化数字化档案系统{% endblock %}

{% block content %}
<div class="form-container">
    <h2>添加传承人</h2>
    <form method="POST" action="{{ url_for('inheritors.create') }}">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required placeholder="请输入姓名">
        </div>
        <div class="form-group">
            <label for="gender">性别</label>
            <select id="gender" name="gender" required>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <label for="birth_year">出生年份</label>
            <input type="number" id="birth_year" name="birth_year" required placeholder="如：1960">
        </div>
        <div class="form-group">
            <label for="category">非遗类别</label>
            <input type="text" id="category" name="category" required placeholder="如：传统技艺、传统美术、传统戏剧">
        </div>
        <div class="form-group">
            <label for="heritage_item">传承项目</label>
            <input type="text" id="heritage_item" name="heritage_item" required placeholder="如：苏绣">
        </div>
        <div class="form-group">
            <label for="province">省份</label>
            <input type="text" id="province" name="province" required placeholder="如：江苏">
        </div>
        <div class="form-group">
            <label for="city">城市</label>
            <input type="text" id="city" name="city" required placeholder="如：苏州">
        </div>
        <div class="form-group">
            <label for="phone">联系电话</label>
            <input type="text" id="phone" name="phone" placeholder="请输入联系电话">
        </div>
        <div class="form-group">
            <label for="description">个人简介</label>
            <textarea id="description" name="description" rows="5" placeholder="请输入个人简介"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交</button>
            <a href="{{ url_for('inheritors.list_inheritors') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
